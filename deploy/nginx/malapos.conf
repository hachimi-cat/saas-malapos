# nginx vhost for malapos — reference config for a Forjio family
# product. A single Next.js process serves the marketing site, the
# dashboard, the admin portal, and the same-origin BFF proxy routes;
# the Express backend is reachable directly under /api/v1/* for the
# SDK, health checks, and webhooks.
#
# FORKERS: `scripts/rename.sh` rewrites `malapos` → <brand-slug>
# and `:3190` / `:4190` → the product's dev ports. Drop this at
# /etc/nginx/sites-available/<brand>.conf on the droplet, symlink it
# into sites-enabled, then `certbot --webroot` for TLS (NOT --nginx —
# see feedback_nginx_auth_request_no_rotation).
#
# /api/v1 path split:
#   Next.js owns:  /api/v1/console/*  — the admin BFF proxy (stamps the
#                  admin role header; see app/api/v1/console/[...path]).
#   Backend owns:  everything else under /api/v1/* — auth, huudis, the
#                  admin API routers, health, webhooks, product routes.
#
# Default route → Next.js (marketing + dashboard + admin + SSR).

upstream malapos_frontend { server 127.0.0.1:3190; keepalive 16; }
upstream malapos_backend  { server 127.0.0.1:4190; keepalive 16; }

# ─── 80 → 443 ────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name malapos.com www.malapos.com malapos.forjio.com;

  # acme-challenge must be served, not redirected — certbot --webroot.
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/malapos;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── 443 ─────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name malapos.com www.malapos.com malapos.forjio.com;

  ssl_certificate     /etc/letsencrypt/live/malapos.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/malapos.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

  client_max_body_size 8m;

  # ── Next.js-owned API paths (must come BEFORE the backend default) ──

  # Admin BFF proxy — the built-in admin portal's same-origin data
  # proxy. The Next.js route handler resolves the admin session cookie,
  # stamps the admin role header, and forwards to the backend's
  # /api/v1/admin/* routers. Routed through a /console/ prefix to avoid
  # colliding with the backend-owned /api/v1/admin/* path.
  location ^~ /api/v1/console/ {
    proxy_pass http://malapos_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }

  # ── Backend-owned API paths ──

  # Inbound webhooks need the raw body untouched (signature verification).
  location ^~ /api/v1/webhooks/ {
    proxy_pass http://malapos_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 60s;
  }

  # Everything else under /api/v1/* — auth (Huudis SSO), huudis (IAM
  # proxy), the admin API routers, health, product routes. SDK +
  # internal callers.
  location ^~ /api/v1/ {
    proxy_pass http://malapos_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 60s;
  }

  # Default — Next.js (marketing + dashboard + admin portal + SSR).
  location / {
    proxy_pass http://malapos_frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }
}
